            top: -20px;

            from {

            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {

            to {

        let currentLang = 'mr';
        let currentFilter = 'all';

        function getBadgeClass(badge) {
            if (badge === 'hot') return 'hot';
            if (badge === 'bestseller') return 'bestseller';
            return '';
        }

        function getBadgeText(badge, lang) {
            const texts = {
                mr: { hot: "हॉट", bestseller: "बेस्टसेलर" },
                hi: { hot: "हॉट", bestseller: "बेस्टसेलर" },
                en: { hot: "Hot", bestseller: "Bestseller" }
            };
            if (badge === 'hot') return texts[lang].hot;
            if (badge === 'bestseller') return texts[lang].bestseller;
            return '';
        }

        function getCategoryName(category, lang) {
            const names = {
                mr: { vegetable: "भाजीपाला", cereal: "धान्य", pulses: "डाळी", oil: "तेलबिया", fruit: "फळे" },
                hi: { vegetable: "सब्जी", cereal: "अनाज", pulses: "दाल", oil: "तिलहन", fruit: "फल" },
                en: { vegetable: "Vegetable", cereal: "Cereal", pulses: "Pulses", oil: "Oilseeds", fruit: "Fruit" }
            };
            return names[lang][category] || category;
        }

        function renderProducts() {
            const products = seedsData[currentLang];
            if (!products || products.length === 0) {
                document.getElementById('productsGrid').innerHTML = '<div style="text-align:center; padding:3rem;">कोणतीही उत्पादने सापडली नाहीत / No products found</div>';
                return;
            }
            
            const filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
            const grid = document.getElementById('productsGrid');
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:3rem;">या श्रेणीत कोणतीही उत्पादने नाहीत / No products in this category</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(product => `
                <div class="product-card">
                    ${product.badge ? `<div class="product-badge ${getBadgeClass(product.badge)}">${getBadgeText(product.badge, currentLang)}</div>` : ''}
                    <img class="product-img" src="${product.image}" alt="${product.name}" onerror="this.src='https://images.unsplash.com/photo-1592982537447-6f2a6a0c7c18?w=400'">
                    <div class="product-info">
                        <span class="product-category">${getCategoryName(product.category, currentLang)}</span>
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-desc">${product.desc}</p>
                        <div class="product-features">
                            ${product.features.map(f => `<span class="feature-tag">✓ ${f}</span>`).join('')}
                        </div>
                        <div class="product-price">${product.price} <small>${currentLang === 'en' ? '/ kg' : (currentLang === 'hi' ? '/ किलो' : '/ किलो')}</small></div>
                        <button class="order-btn" onclick="alert('${currentLang === 'mr' ? 'ऑर्डर स्वीकारली गेली! लवकरच संपर्क करू.' : currentLang === 'hi' ? 'ऑर्डर स्वीकार कर ली गई! जल्द संपर्क करेंगे.' : 'Order placed! We will contact you soon.'}')">${translations[currentLang].order_btn}</button>
                    </div>
                </div>
            `).join('');
        }

        function updateLanguage(lang) {
            currentLang = lang;
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang] && translations[lang][key]) {
                    if (el.tagName === 'BUTTON' && el.classList.contains('order-btn')) return;
                    el.textContent = translations[lang][key];
                }
            });
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const key = btn.getAttribute('data-key');
                if (translations[lang] && translations[lang][key]) {
                    btn.textContent = translations[lang][key];
                }
            });
            
            renderProducts();
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-lang') === lang) btn.classList.add('active');
            });
            
            localStorage.setItem('preferred_language', lang);
        }

        // Event Listeners
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => updateLanguage(btn.getAttribute('data-lang')));
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                renderProducts();
            });
        });
        
        const savedLang = localStorage.getItem('preferred_language') || 'mr';
        updateLanguage(savedLang);
